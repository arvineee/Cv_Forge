{% extends "base_dashboard.html" %}
{% block title %}New Cover Letter{% endblock %}
{% block page_title %}Generate Cover Letter{% endblock %}
{% block page_subtitle %}AI-tailored to the job in seconds{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <form method="POST" class="bg-white rounded-xl border border-gray-100 shadow-sm divide-y divide-gray-100">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="p-6 space-y-5">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Job Title *</label>
          <input type="text" name="job_title" required placeholder="e.g. Software Engineer"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Company Name</label>
          <input type="text" name="company_name" placeholder="e.g. Safaricom"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Tone</label>
          <select name="tone"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            {% for val, label in [('professional','Professional'),('formal','Formal'),('executive','Executive'),('friendly','Friendly')] %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Use My CV (optional)</label>
          <select name="resume_id"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">— Don't use a CV —</option>
            {% for resume in resumes %}
            <option value="{{ resume.id }}">{{ resume.title }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Job Description *</label>
        <textarea name="job_description" rows="8" required
                  placeholder="Paste the full job description here for a more tailored letter..."
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
      </div>
    </div>
    <div class="p-6">
      <button type="submit"
              class="w-full py-3 gradient-brand text-white font-semibold rounded-xl hover:opacity-90 transition text-sm">
        ✨ Generate Cover Letter
      </button>
    </div>
  </form>
</div>
{% endblock %}
