{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-2 font-bold text-2xl text-gray-900">
        <div class="w-9 h-9 rounded-xl gradient-brand flex items-center justify-center text-white font-black text-sm">CV</div>
        CVForge AI
      </a>
      <p class="text-gray-500 mt-2">Reset your password</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <p class="text-sm text-gray-500 mb-6">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
          <input type="email" name="email" required autofocus
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <button type="submit"
                class="w-full py-3 gradient-brand text-white font-semibold rounded-xl hover:opacity-90 transition text-sm">
          Send Reset Link
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline">← Back to Sign In</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
