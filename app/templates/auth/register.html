{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-2 font-bold text-2xl text-gray-900">
        <div class="w-9 h-9 rounded-xl gradient-brand flex items-center justify-center text-white font-black text-sm">CV</div>
        CVForge AI
      </a>
      <p class="text-gray-500 mt-2">Create your free account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label>
            <input type="text" name="first_name" value="{{ first_name or '' }}"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
            <input type="text" name="last_name" value="{{ last_name or '' }}"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email *</label>
          <input type="email" name="email" value="{{ email or '' }}" required
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password *</label>
          <input type="password" name="password" required minlength="8"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password *</label>
          <input type="password" name="confirm_password" required minlength="8"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <button type="submit"
                class="w-full py-3 gradient-brand text-white font-semibold rounded-xl hover:opacity-90 transition text-sm">
          Create Free Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
