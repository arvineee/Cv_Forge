{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="text-center">
    <p class="text-7xl font-black text-orange-100">500</p>
    <h1 class="text-2xl font-bold text-gray-900 mt-2">Something Went Wrong</h1>
    <p class="text-gray-500 mt-2 mb-6">An unexpected error occurred. Our team has been notified.</p>
    <a href="{{ url_for('main.index') }}"
       class="inline-block px-6 py-3 gradient-brand text-white rounded-xl font-semibold hover:opacity-90 transition">
      Go Home
    </a>
  </div>
</div>
{% endblock %}
