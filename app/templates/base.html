<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CVForge AI{% endblock %} — CVForge</title>
  <meta name="description" content="{% block meta_description %}AI-powered CV builder for African professionals.{% endblock %}"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    [x-cloak]{display:none!important}
    .gradient-brand{background:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%)}
    .card-hover{transition:all .2s ease;border:1px solid #e5e7eb}
    .card-hover:hover{box-shadow:0 8px 30px rgba(37,99,235,.12);border-color:#bfdbfe;transform:translateY(-2px)}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900 antialiased">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div id="flash-container" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm w-full">
    {% for category, message in messages %}
    <div x-data="{show:true}" x-show="show" x-transition
         class="flex items-start gap-3 p-4 rounded-xl shadow-lg text-sm font-medium
         {% if category == 'error' %}bg-red-50 text-red-800 border border-red-200
         {% elif category == 'success' %}bg-green-50 text-green-800 border border-green-200
         {% elif category == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
         {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
      <span class="flex-1">{{ message }}</span>
      <button @click="show=false" class="opacity-60 hover:opacity-100 text-lg leading-none">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

{% block body %}{% endblock %}

{% block extra_scripts %}{% endblock %}
</body>
</html>
